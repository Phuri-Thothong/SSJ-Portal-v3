@if (adminService.toastState(); as toast) {
  @if (toast.show) {
    <div class="fixed top-10 left-1/2 -translate-x-1/2 z-50 animate-in fade-in slide-in-from-top-4 duration-500">
      <div class="glass-card px-8 py-4 shadow-2xl flex items-center gap-4 border border-white/60"
           style="background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border-radius: 1.5rem; transform: none;">
        
        <div class="w-10 h-10 rounded-full flex items-center justify-center border"
             [ngClass]="toast.type === 'success'
               ? 'bg-emerald-500/20 text-emerald-600 border-emerald-500/30'
               : 'bg-rose-500/20 text-rose-600 border-rose-500/30'">
          <i [class]="toast.type === 'success' ? 'fa-solid fa-check' : 'fa-solid fa-triangle-exclamation'"></i>
        </div>

        <div class="flex flex-col text-left">
          <span class="text-sm font-bold text-slate-800">
            {{ toast.type === 'success' ? 'ดำเนินการสำเร็จ' : 'เกิดข้อผิดพลาด' }}
          </span>
          <span class="text-xs text-slate-600">{{ toast.message }}</span>
        </div>

        <button (click)="adminService.hideToast()"
                class="ml-4 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
  }
}

<div class="min-h-screen flex items-center justify-center bg-linear-to-tr from-[#91e7d9]/40 via-[#e2bbf7]/40 to-[#80b3ff]/40 px-4">
  
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute top-[15%] left-[10%] w-72 h-72 bg-purple-400/20 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[15%] right-[10%] w-96 h-96 bg-teal-400/20 blur-[150px] rounded-full"></div>
  </div>

  <div class="glass-card w-full max-w-md p-8 md:p-12 border border-white/60 shadow-2xl relative z-10 animate-in fade-in zoom-in duration-700"
       style="background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(25px); border-radius: 2.5rem; transform: none;">
    
    <div class="text-center">
      <div class="mb-6 inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-linear-to-br from-blue-500/10 to-teal-500/10 text-blue-600 border border-blue-500/20 shadow-inner shadow-slate-900/10">
        <i class="fa-solid fa-key text-3xl"></i>
      </div>
      
      <h2 class="text-3xl font-black text-slate-800 tracking-tight">ลืมรหัสผ่าน?</h2>
      <p class="text-slate-500 text-sm mt-2 mb-10 font-medium">ระบุอีเมลบุคลากร สสจ. เพื่อรับลิงก์ตั้งรหัสผ่านใหม่</p>

      <form (submit)="onSubmit($event)" class="space-y-6 text-left">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 ml-1">อีเมล (Email)</label>
          <div class="relative">
            <i class="fa-regular fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="email" name="email" [(ngModel)]="email" placeholder="ชื่ออีเมล@nst.go.th"
                   class="w-full pl-12 pr-5 py-4 bg-white/60 border border-white rounded-2xl focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 outline-none transition-all placeholder:text-slate-300 text-slate-700 font-medium">
          </div>
        </div>

        <button type="submit" [disabled]="isLoading()"
                class="w-full martial py-4 bg-linear-to-r from-blue-600 to-teal-400 text-white font-black rounded-full hover:opacity-90 hover:shadow-xl hover:shadow-blue-500/30 transition-all group active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer">
          @if (isLoading()) {
            <i class="fa-solid fa-circle-notch animate-spin mr-2"></i> กำลังส่งข้อมูล...
          } @else {
            ส่งลิงก์กู้คืนรหัสผ่าน <i class="fa-solid fa-paper-plane ml-2 text-sm transition-transform group-hover:translate-x-1.5 opacity-60 group-hover:opacity-100"></i>
          }
        </button>

        <div class="text-center mt-6">
          <a routerLink="/login" class="text-xs font-bold text-teal-600 hover:text-blue-600 transition-colors cursor-pointer inline-flex items-center gap-2 group">
            <i class="fa-solid fa-arrow-left text-xs group-hover:-translate-x-1.5"></i> กลับไปหน้าเข้าสู่ระบบ
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
