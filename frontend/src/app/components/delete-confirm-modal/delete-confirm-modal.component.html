<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <div
    class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-300"
    (click)="adminService.closeDeleteModal()"
  ></div>

  <div
    class="relative bg-white/90 backdrop-blur-xl w-full max-w-md rounded-3xl shadow-2xl border border-white/50 p-8 animate-in zoom-in-95 duration-300"
  >
    <div class="flex flex-col items-center text-center">
      <div
        class="w-16 h-16 bg-rose-100 text-rose-500 rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-inner"
      >
        <i class="fa-solid fa-trash-can"></i>
      </div>

      <h3 class="text-xl font-bold text-slate-800 mb-2">ยืนยันการลบข้อมูล</h3>
      <p class="text-slate-500 mb-6 leading-relaxed">
        คุณต้องการย้ายบริการ
        <span class="font-bold text-slate-800">"{{ adminService.serviceToDelete()?.title }}"</span>
        ไปยังถังขยะหรือไม่? <br /><span class="text-xs text-rose-400 mt-2 block"
          >***ข้อมูลนี้จะยังสามารถกู้คืนได้จากเมนูถังขยะ***</span
        >
      </p>
    </div>

    <div class="flex gap-3">
      <button
        (click)="adminService.closeDeleteModal()"
        class="flex-1 py-3 px-4 rounded-2xl font-semibold text-slate-600 hover:bg-slate-100 transition-colors active:scale-95"
      >
        ยกเลิก
      </button>

      <button
        (click)="adminService.confirmSoftDelete()"
        class="flex-1 py-3 px-4 rounded-2xl font-bold text-white bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-600 hover:to-pink-700 shadow-lg shadow-rose-200 transition-all active:scale-95 flex items-center justify-center gap-2"
      >
        <i class="fa-solid fa-trash"></i>
        ย้ายไปยังถังขยะ
      </button>
    </div>
  </div>
</div>
