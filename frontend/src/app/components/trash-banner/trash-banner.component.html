<div class="mb-8 animate-in slide-in-from-top-4 duration-500">
  <div
    class="trash-glass-card p-5 md:p-6 flex flex-col md:flex-row items-center justify-between gap-4 relative overflow-hidden"
  >
    <div class="absolute -right-6 -top-6 w-32 h-32 bg-rose-500/10 rounded-full blur-3xl"></div>

    <div class="flex items-center gap-4 relative z-10">
      <div
        class="w-12 h-12 bg-linear-to-br from-rose-500 to-pink-600 text-white rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-rose-200"
      >
        <i class="fa-solid fa-clock-rotate-left animate-pulse"></i>
      </div>
      <div class="text-center md:text-left">
        <h3 class="text-lg font-bold text-rose-700 leading-tight">โหมดจัดการถังขยะ</h3>
        <p class="text-sm text-rose-600/70">
          กำลังแสดงรายการที่ถูกลบชั่วคราว คุณสามารถกู้คืนหรือลบถาวรได้
        </p>
      </div>
    </div>

    <button
      (click)="adminService.toggleTrashMode()"
      class="relative z-10 px-6 py-2.5 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl shadow-md shadow-rose-200 transition-all active:scale-95 flex items-center gap-2 text-sm border border-rose-400/20"
    >
      <i class="fa-solid fa-circle-left"></i>
      กลับสู่หน้าหลัก
    </button>
  </div>
</div>
