<div class="password-checklist mt-4 mb-4 ml-1 text-start">
  <p class="text-[11px] font-bold mb-3 text-slate-400 uppercase tracking-wider">รหัสผ่านต้องประกอบด้วย:</p>
  <ul class="space-y-2">
    <li [ngClass]="getRuleState(hasMinLength)" class="text-sm transition-all duration-300">
      <span class="checkbox-icon"></span> อย่างน้อย 8 ตัวอักษร
    </li>
    <li [ngClass]="getRuleState(hasUpperCase)" class="text-sm transition-all duration-300">
      <span class="checkbox-icon"></span> ตัวอักษรภาษาอังกฤษพิมพ์ใหญ่ (A-Z)
    </li>
    <li [ngClass]="getRuleState(hasLowerCase)" class="text-sm transition-all duration-300">
      <span class="checkbox-icon"></span> ตัวอักษรภาษาอังกฤษพิมพ์เล็ก (a-z)
    </li>
    <li [ngClass]="getRuleState(hasNumber)" class="text-sm transition-all duration-300">
      <span class="checkbox-icon"></span> ตัวเลขอย่างน้อย 1 ตัว (0-9)
    </li>
    <li [ngClass]="getRuleState(hasSpecialChar)" class="text-sm transition-all duration-300">
      <span class="checkbox-icon"></span> อักขระพิเศษอย่างน้อย 1 ตัว (เช่น @, #, $, _ , -)
    </li>
  </ul>
</div>
