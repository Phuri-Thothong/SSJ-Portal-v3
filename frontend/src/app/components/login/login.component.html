<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 via-blue-50 to-teal-50 px-4">
  
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute top-[10%] left-[15%] w-64 h-64 bg-blue-400/20 blur-[100px] rounded-full"></div>
    <div class="absolute bottom-[10%] right-[15%] w-80 h-80 bg-teal-400/20 blur-[120px] rounded-full"></div>
  </div>

  <div class="glass-card w-full max-w-md p-8 md:p-12 border border-white/60 shadow-2xl relative z-10 animate-in fade-in zoom-in duration-700"
       style="background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border-radius: 2.5rem;">
    
    <div class="text-center">
      <div class="mb-6 inline-flex items-center justify-center w-20 h-20 rounded-[2rem] bg-slate-900 text-white shadow-xl shadow-slate-900/20">
        <i class="fa-solid fa-fingerprint text-4xl"></i>
      </div>
      
      <h2 class="text-3xl font-black text-slate-800 tracking-tight">SSJ PORTAL</h2>
      <p class="text-slate-500 text-sm mt-2 mb-10 font-medium">ระบบบริหารจัดการข้อมูลบุคลากร สสจ.</p>

      <form (submit)="onLogin($event)" class="space-y-6 text-left">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 ml-1">Username</label>
          <div class="relative">
            <i class="fa-regular fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" name="username" [(ngModel)]="credentials.username" placeholder="ชื่อผู้ใช้งาน"
                   class="w-full pl-12 pr-5 py-4 bg-white/60 border border-white rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all placeholder:text-slate-300">
          </div>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 ml-1">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="password" name="password" [(ngModel)]="credentials.password" placeholder="รหัสผ่าน"
                   class="w-full pl-12 pr-5 py-4 bg-white/60 border border-white rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all placeholder:text-slate-300">
          </div>
        </div>

        <button type="submit" [disabled]="isLoading()"
                class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-blue-600 hover:shadow-2xl hover:shadow-blue-500/40 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
          @if (isLoading()) {
            <i class="fa-solid fa-circle-notch animate-spin mr-2"></i> กำลังตรวจสอบ...
          } @else {
            เข้าสู่ระบบ <i class="fa-solid fa-arrow-right ml-2 text-sm opacity-50"></i>
          }
        </button>
      </form>
      
      <p class="mt-10 text-[10px] text-slate-400 font-medium uppercase tracking-widest">
        &copy; 2026 Digital Health Team - NST PH Office
      </p>
    </div>
  </div>
</div>
