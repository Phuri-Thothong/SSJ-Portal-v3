<div class="fixed bottom-8 right-8 z-50">
  <div class="absolute bottom-full right-0 mb-4 px-4 py-2 bg-slate-900 text-white text-xs rounded-xl 
              opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap shadow-xl"
       [class.opacity-100]="isHovered">
    {{ isAdminMode() ? 'สลับเป็นโหมดผู้ใช้' : 'สลับโหมดจัดการ' }}
    <div class="absolute top-full right-5 -mt-1 border-4 border-transparent border-t-slate-900"></div>
  </div>

  <div class="coin-wrapper" 
       [class.is-flipped]="isAdminMode()"
       (mouseenter)="isHovered = true" 
       (mouseleave)="isHovered = false"
       (click)="toggleMode()">
    
    <div class="coin-inner">
      <div class="coin-front shadow-2xl ring-4 ring-slate-200">
        <i class="fa-solid fa-user-shield text-xl"></i>
        <div class="shine-effect"></div>
      </div>

      <div class="coin-back shadow-2xl ring-4 ring-orange-200">
        <i class="fa-solid fa-user-gear text-xl"></i>
        <div class="shine-effect"></div>
      </div>
    </div>
  </div>
</div>
